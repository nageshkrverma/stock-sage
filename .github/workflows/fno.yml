name: F&O Scanner — Every 10 Minutes

on:
  schedule:
    # Every 10 min, 3:00–10:50 UTC = 8:30 AM–4:20 PM IST, Mon–Fri
    - cron: '*/10 3-10 * * 1-5'
  workflow_dispatch:

concurrency:
  group: fno-scanner
  cancel-in-progress: true

jobs:
  fno:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run F&O scanner
        run: python scanner/fno_scanner.py
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}

      - name: Commit fno.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          cp data/fno.json /tmp/fno.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/fno.json data/fno.json
          git add data/fno.json
          git diff --cached --quiet || git commit -m "fno: $(date +'%H:%M IST')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
