name: Stock Scanner — Live Market

on:
  schedule:
    # IST = UTC + 5:30
    # 9:15 AM IST  = 03:45 UTC
    # 9:45 AM IST  = 04:15 UTC
    # 10:15 AM IST = 04:45 UTC
    # 10:45 AM IST = 05:15 UTC
    # 11:15 AM IST = 05:45 UTC
    # 11:45 AM IST = 06:15 UTC
    # 12:15 PM IST = 06:45 UTC
    # 12:45 PM IST = 07:15 UTC
    # 1:15 PM IST  = 07:45 UTC
    # 1:45 PM IST  = 08:15 UTC
    # 2:15 PM IST  = 08:45 UTC
    # 2:45 PM IST  = 09:15 UTC
    # 3:15 PM IST  = 09:45 UTC
    # 3:45 PM IST  = 10:15 UTC
    - cron: '45 3 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '45 4 * * 1-5'
    - cron: '15 5 * * 1-5'
    - cron: '45 5 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron: '45 6 * * 1-5'
    - cron: '15 7 * * 1-5'
    - cron: '45 7 * * 1-5'
    - cron: '15 8 * * 1-5'
    - cron: '45 8 * * 1-5'
    - cron: '15 9 * * 1-5'
    - cron: '45 9 * * 1-5'
    - cron: '15 10 * * 1-5'
  workflow_dispatch:  # manual trigger anytime

concurrency:
  group: stock-scanner
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scanner
        run: python scanner/main.py
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}

      - name: Commit and push signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          cp data/signals.json /tmp/signals.json
          cp data/signals_history.json /tmp/signals_history.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/signals.json data/signals.json
          cp /tmp/signals_history.json data/signals_history.json
          git add data/signals.json data/signals_history.json data/fno.json
          git diff --cached --quiet || (git commit -m "signals: $(date +'%Y-%m-%d %H:%M IST')" && echo "SIGNALS_UPDATED=true" >> $GITHUB_ENV)
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send push notification to users
        if: env.SIGNALS_UPDATED == 'true'
        continue-on-error: true
        run: |
          TOTAL=$(python -c "import json; d=json.load(open('data/signals.json')); print(len(d.get('signals', [])))")
          DATE=$(date +'%d %b %Y')
          curl -s "${{ secrets.GAS_URL }}&action=sendSignalAlert&totalSignals=${TOTAL}&marketDate=${DATE}" || true
