name: Stock Scanner

on:
  schedule:
    - cron: '15 10 * * 1-5'  # 3:45 PM IST = 10:15 UTC, weekdays only
  workflow_dispatch:           # manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scanner
        run: python scanner/main.py

      - name: Commit and push signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add data/signals.json data/signals_history.json
          git diff --cached --quiet || git commit -m "signals: $(date +'%Y-%m-%d')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
